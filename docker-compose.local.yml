services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: omb
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do echo waiting for minio; sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/omb-photos;
      /usr/bin/mc anonymous set public local/omb-photos;
      exit 0;
      "

  waha:
    image: devlikeapro/waha:2026.3.4
    network_mode: host
    environment:
      PORT: '3100'
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      WAHA_API_KEY: local-api-key
      WHATSAPP_START_SESSION: default
      WHATSAPP_DOWNLOAD_MEDIA: 'true'
      WAHA_PRINT_QR: 'true'

volumes:
  postgres-data:
  minio-data:
