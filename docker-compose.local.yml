services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: omb
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  collector:
    profiles:
      - collector
    build:
      context: .
      dockerfile: packages/collector/Dockerfile
      target: dev
    environment:
      BACKEND_URL: http://host.docker.internal:3000
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: omb-photos
      STORAGE_KEY: minioadmin
      STORAGE_SECRET: minioadmin
      LOG_LEVEL: debug
    volumes:
      - baileys-session:/app/session
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - minio

volumes:
  postgres-data:
  baileys-session:
