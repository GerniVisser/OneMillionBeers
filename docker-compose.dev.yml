services:
  nginx:
    build:
      context: ./packages/gateway
      dockerfile: Dockerfile
      target: dev
    ports:
      - '80:80'
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      target: dev
    expose:
      - '3000'
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/omb
      LOG_LEVEL: debug
    depends_on:
      - postgres

  collector-telegram:
    build:
      context: .
      dockerfile: packages/collector-telegram/Dockerfile
      target: dev
    environment:
      BACKEND_URL: http://backend:3000
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_URL: http://localhost:9000
      STORAGE_BUCKET: omb-photos
      STORAGE_KEY: minioadmin
      STORAGE_SECRET: minioadmin
      LOG_LEVEL: debug
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      - backend
      - minio

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      target: dev
    expose:
      - '3001'
    environment:
      PORT: '3001'
      BACKEND_INTERNAL_URL: http://backend:3000
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    expose:
      - '5432'
    environment:
      POSTGRES_DB: omb
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do echo waiting for minio; sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/omb-photos;
      /usr/bin/mc anonymous set public local/omb-photos;
      exit 0;
      "

volumes:
  postgres-data:
  minio-data:
