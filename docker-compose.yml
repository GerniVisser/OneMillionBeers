services:
  nginx:
    image: ghcr.io/${GITHUB_REPOSITORY}/omb-gateway:${GIT_SHA}
    build:
      context: ./packages/gateway
      dockerfile: Dockerfile
      target: prod
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/omb-backend:${GIT_SHA}
    expose:
      - '3000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    restart: unless-stopped

  collector:
    image: ghcr.io/${GITHUB_REPOSITORY}/omb-collector:${GIT_SHA}
    environment:
      COLLECTOR: ${COLLECTOR:-telegram}
      BACKEND_URL: http://backend:3000
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_KEY: ${STORAGE_KEY}
      STORAGE_SECRET: ${STORAGE_SECRET}
      STORAGE_REGION: ${STORAGE_REGION:-auto}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - baileys-session:/app/session
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/omb-frontend:${GIT_SHA}
    expose:
      - '3001'
    environment:
      ORIGIN: ${ORIGIN:-https://gernivisser.com}
      PORT: '3001'
      BACKEND_INTERNAL_URL: http://backend:3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  baileys-session:
  certbot-www:
  certbot-certs:
