services:
  nginx:
    image: ghcr.io/${GITHUB_REPOSITORY}/omb-gateway:${GIT_SHA}
    build:
      context: ./packages/gateway
      dockerfile: Dockerfile
      target: prod
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
      - collector-whatsapp
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /omb/nginx
        tag: nginx/{{.ID}}

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/omb-backend:${GIT_SHA}
    expose:
      - '3000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /omb/backend
        tag: backend/{{.ID}}

  collector-telegram:
    image: ghcr.io/${GITHUB_REPOSITORY}/omb-collector-telegram:${GIT_SHA}
    environment:
      BACKEND_URL: http://backend:3000
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_KEY: ${STORAGE_KEY}
      STORAGE_SECRET: ${STORAGE_SECRET}
      STORAGE_REGION: ${STORAGE_REGION:-auto}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /omb/collector-telegram
        tag: collector-telegram/{{.ID}}

  waha:
    image: devlikeapro/waha:2026.3.4
    expose:
      - '3000'
    restart: unless-stopped
    environment:
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      WAHA_API_KEY: ${WAHA_API_KEY}
      WHATSAPP_START_SESSION: default
      WHATSAPP_DOWNLOAD_MEDIA: 'true'
      WAHA_WEBHOOK_URL: http://collector-whatsapp:8080/webhook
      WAHA_WEBHOOK_EVENTS: message,session.status,group.v2.join,group.v2.update
    logging:
      driver: awslogs
      options:
        awslogs-group: /omb/waha
        awslogs-region: us-east-1
        tag: 'waha/{{.ID}}'

  collector-whatsapp:
    image: ghcr.io/${GITHUB_REPOSITORY}/omb-collector-whatsapp:${GIT_SHA}
    expose:
      - '8080'
    restart: unless-stopped
    depends_on:
      - waha
      - backend
    environment:
      BACKEND_URL: http://backend:3000
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_REGION: ${STORAGE_REGION:-auto}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY}
      COLLECTOR_PORT: '8080'
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      STATUS_TOKEN: ${STATUS_TOKEN}
      ENABLE_ALERTS: ${ENABLE_ALERTS:-false}
      ALERT_EMAIL: ${ALERT_EMAIL}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL}
      AWS_REGION: ${AWS_REGION}
    logging:
      driver: awslogs
      options:
        awslogs-group: /omb/collector-whatsapp
        awslogs-region: us-east-1
        tag: 'collector-whatsapp/{{.ID}}'

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/omb-frontend:${GIT_SHA}
    expose:
      - '3001'
    environment:
      ORIGIN: ${ORIGIN:-https://onemillionbeers.co.za}
      PORT: '3001'
      BACKEND_INTERNAL_URL: http://backend:3000
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /omb/frontend
        tag: frontend/{{.ID}}

volumes:
  certbot-www:
  certbot-certs:
