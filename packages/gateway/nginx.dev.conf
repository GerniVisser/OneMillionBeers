events {}

http {
  resolver 127.0.0.11 valid=10s;

  server {
    listen 80;
    server_name localhost;

    set $backend             backend:3000;
    set $frontend            frontend:3001;
    set $collector_whatsapp  collector-whatsapp:8080;

    # SSE — must come before the general /api/ block
    location = /api/v1/global/stream {
      proxy_pass         http://$backend/v1/global/stream;
      proxy_http_version 1.1;
      proxy_buffering    off;
      proxy_cache        off;
      proxy_read_timeout 3600s;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        '';
      chunked_transfer_encoding on;
    }

    # Swagger UI — static assets use absolute /docs/ paths (no /api/ prefix)
    location /docs/ {
      proxy_pass         http://$backend/docs/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Backend API — strip /api prefix
    location /api/ {
      proxy_pass         http://$backend/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # WhatsApp collector status page — operator QR scan tool (token-protected)
    location = /whatsapp/status {
      proxy_pass         http://$collector_whatsapp/status;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # SvelteKit frontend — hot reload websocket support
    location / {
      proxy_pass         http://$frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        'upgrade';
    }
  }
}
