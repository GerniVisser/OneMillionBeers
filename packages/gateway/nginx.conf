upstream backend {
  server backend:3000;
}

upstream frontend {
  server frontend:3001;
}

server {
  listen 80;
  server_name _;

  # HTTP → HTTPS redirect (certbot will overwrite this block for production)
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name gernivisser.com;

  ssl_certificate     /etc/letsencrypt/live/gernivisser.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gernivisser.com/privkey.pem;

  # SSE — must come before the general /api/ block
  location = /api/v1/global/stream {
    proxy_pass         http://backend/v1/global/stream;
    proxy_http_version 1.1;
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 3600s;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    # Required for SSE
    proxy_set_header   Connection        '';
    chunked_transfer_encoding on;
  }

  # Backend API — strip /api prefix
  location /api/ {
    proxy_pass         http://backend/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # SvelteKit frontend — everything else
  location / {
    proxy_pass         http://frontend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        'upgrade';
  }
}
