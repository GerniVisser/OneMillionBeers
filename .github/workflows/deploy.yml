name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "GIT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/omb-backend:${{ env.GIT_SHA }}

      - name: Build and push collector image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/collector/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/omb-collector:${{ env.GIT_SHA }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/omb-frontend:${{ env.GIT_SHA }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: packages/gateway
          file: packages/gateway/Dockerfile
          target: prod
          push: true
          tags: ghcr.io/${{ github.repository }}/omb-gateway:${{ env.GIT_SHA }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/onemillionbeers
            echo "GIT_SHA=${{ env.GIT_SHA }}" > .env.sha
            echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env.sha
            docker compose --env-file .env --env-file .env.sha pull backend collector frontend nginx
            docker compose --env-file .env --env-file .env.sha up -d --no-deps backend collector frontend nginx

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 10
            curl --fail https://gernivisser.com/api/health
            curl --fail https://gernivisser.com/health
