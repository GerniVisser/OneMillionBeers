name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: |
          echo "GIT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/omb-backend:${{ env.GIT_SHA }}

      - name: Build and push collector-telegram image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/collector-telegram/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/omb-collector-telegram:${{ env.GIT_SHA }}

      - name: Build and push collector-whatsapp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/collector-whatsapp/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/omb-collector-whatsapp:${{ env.GIT_SHA }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/omb-frontend:${{ env.GIT_SHA }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: packages/gateway
          file: packages/gateway/Dockerfile
          target: prod
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/omb-gateway:${{ env.GIT_SHA }}

      - name: Build and push flyway image
        uses: docker/build-push-action@v6
        with:
          context: db
          file: db/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/omb-flyway:${{ env.GIT_SHA }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy
          aws-region: us-east-1

      - name: Upload deploy artifacts to S3
        run: |
          aws s3 cp docker-compose.yml s3://onemillionbeers-deploy-prod/docker-compose.yml
          aws s3 cp scripts/prod-db-migrate.sh s3://onemillionbeers-deploy-prod/scripts/prod-db-migrate.sh

      - name: Deploy to EC2
        uses: MercuryTechnologies/aws-ssm-send-command-action@v0.1.0
        with:
          targets: '[{"Key":"InstanceIds","Values":["${{ secrets.EC2_INSTANCE_ID }}"]}]'
          document-name: AWS-RunShellScript
          parameters: |
            {
              "commands": [
                "mkdir -p /opt/onemillionbeers",
                "aws s3 cp s3://onemillionbeers-deploy-prod/docker-compose.yml /opt/onemillionbeers/docker-compose.yml",
                "aws s3 cp s3://onemillionbeers-deploy-prod/scripts/prod-db-migrate.sh /opt/onemillionbeers/prod-db-migrate.sh",
                "chmod +x /opt/onemillionbeers/prod-db-migrate.sh",
                "cd /opt/onemillionbeers",
                "aws ssm get-parameters-by-path --path '/omb/' --with-decryption --region us-east-1 --output json | python3 -c \"import json,sys; [print(p['Name'].rsplit('/',1)[-1]+'='+p['Value']) for p in json.load(sys.stdin)['Parameters']]\" > .env",
                "chmod 600 .env",
                "printf 'GIT_SHA=%s\\nGITHUB_REPOSITORY=%s\\n' '${{ env.GIT_SHA }}' '${{ env.REPO_LC }}' > .env.sha",
                "docker compose --env-file .env --env-file .env.sha pull backend collector-telegram collector-whatsapp frontend nginx",
                "docker pull ghcr.io/${{ env.REPO_LC }}/omb-flyway:${{ env.GIT_SHA }}",
                "FLYWAY_IMAGE=ghcr.io/${{ env.REPO_LC }}/omb-flyway:${{ env.GIT_SHA }} ./prod-db-migrate.sh",
                "docker compose --env-file .env --env-file .env.sha up -d --no-deps backend collector-telegram collector-whatsapp waha frontend nginx"
              ]
            }
          wait-until-command-executed: true
          max-wait-time: 600
          log-failed-command-invocations: true

      - name: Health check
        run: |
          sleep 15
          curl --fail https://onemillionbeers.co.za/api/health
          curl --fail https://onemillionbeers.co.za/health
