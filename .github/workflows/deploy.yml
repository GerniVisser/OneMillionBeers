name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: |
          echo "GIT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/omb-backend:${{ env.GIT_SHA }}

      - name: Build and push collector image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/collector/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/omb-collector:${{ env.GIT_SHA }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/omb-frontend:${{ env.GIT_SHA }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: packages/gateway
          file: packages/gateway/Dockerfile
          target: prod
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/omb-gateway:${{ env.GIT_SHA }}

      - name: Encode docker-compose.yml
        run: echo "COMPOSE_B64=$(base64 -w0 docker-compose.yml)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy
          aws-region: us-east-1

      - name: Deploy to EC2
        uses: MercuryTechnologies/aws-ssm-send-command-action@v0
        with:
          instance-id: ${{ secrets.EC2_INSTANCE_ID }}
          document-name: AWS-RunShellScript
          parameters: |
            {
              "commands": [
                "mkdir -p /opt/onemillionbeers",
                "echo ${{ env.COMPOSE_B64 }} | base64 -d > /opt/onemillionbeers/docker-compose.yml",
                "cd /opt/onemillionbeers",
                "aws ssm get-parameters-by-path --path '/omb/' --with-decryption --region us-east-1 --query 'Parameters[*].[Name,Value]' --output text | while IFS=$'\\t' read -r name value; do printf '%s=%s\\n' \"${name##/omb/}\" \"$value\"; done > .env",
                "chmod 600 .env",
                "printf 'GIT_SHA=%s\\nGITHUB_REPOSITORY=%s\\n' '${{ env.GIT_SHA }}' '${{ env.REPO_LC }}' > .env.sha",
                "docker compose --env-file .env --env-file .env.sha pull backend collector frontend nginx",
                "docker compose --env-file .env --env-file .env.sha up -d --no-deps backend collector frontend nginx"
              ]
            }
          wait-until-command-executed: true
          max-wait-time: 600
          log-failed-command-invocations: true

      - name: Health check
        run: |
          sleep 15
          curl --fail https://gernivisser.com/api/health
          curl --fail https://gernivisser.com/health
